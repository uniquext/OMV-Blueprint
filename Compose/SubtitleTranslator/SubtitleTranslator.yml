# SubtitleTranslator 服务
# 端口: 9800

services:
  subtitle_translator:
    container_name: subtitle_translator
    hostname: subtitle_translator
    image: subtitle_translator:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${ENV_HOST_PORT:-9800}:${ENV_APP_PORT:-9800}"
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Asia/Shanghai}
      APP_PORT: ${ENV_APP_PORT}
      LLM_API_URL: ${ENV_LLM_API_URL}
      LLM_API_KEY: ${ENV_LLM_API_KEY}
      LLM_MODEL: ${ENV_LLM_MODEL}
      LLM_MODEL_TYPE: ${ENV_LLM_MODEL_TYPE}
      LLM_TIMEOUT: ${ENV_LLM_TIMEOUT}
      BATCH_SIZE: ${ENV_BATCH_SIZE}
      CONTEXT_SIZE: ${ENV_CONTEXT_SIZE}
      RPM_LIMIT: ${ENV_RPM_LIMIT}
      TPM_LIMIT: ${ENV_TPM_LIMIT}
      MAX_RETRIES: ${ENV_MAX_RETRIES}
      DEBOUNCE_SECONDS: ${ENV_DEBOUNCE_SECONDS}
      DEBOUNCE_POLL_INTERVAL: ${ENV_DEBOUNCE_POLL_INTERVAL}
      FUNNEL_WORKERS: ${ENV_FUNNEL_WORKERS}
      SCAN_INTERVAL: ${ENV_SCAN_INTERVAL}
      SCAN_DIR: ${ENV_SCAN_DIR}
      MEDIA_EXTENSIONS: ${ENV_MEDIA_EXTENSIONS}
      LANG_MAP_OVERRIDE: ${ENV_LANG_MAP_OVERRIDE}
      WATCHDOG_ENABLED: ${ENV_WATCHDOG_ENABLED}
      WATCHDOG_PATH: ${ENV_WATCHDOG_PATH}
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
      - ./prompts:/app/prompts
      - ./media_mnt:/media
    networks:
      default:

networks:
  default:
    name: subtitle_translator_net
