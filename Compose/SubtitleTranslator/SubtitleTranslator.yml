# SubtitleTranslator 服务
# 端口: 9800

services:
  subtitle_translator:
    container_name: subtitle_translator
    hostname: subtitle_translator
    image: subtitle_translator:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${ENV_HOST_PORT:-9800}:${ENV_APP_PORT:-9800}"
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Asia/Shanghai}
      APP_PORT: ${ENV_APP_PORT}

    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
      - ./prompts:/app/prompts
      - ./media_mnt:/media
    networks:
      default:

networks:
  default:
    name: subtitle_translator_net
