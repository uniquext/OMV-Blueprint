# ==============================================================================
# 无脑纯直连空壳配置 (紧急避险兜底专用！)
# ==============================================================================
# 当主力 config.yaml 解析失败、机场跑路导致全局断网瘫痪时，
# 系统会使用此配置，启动一个不带有任何出海节点和分流规则的监听端口，
# 它仅仅让 7890 端口不报错，并把收到的所有请求直接按照物理直连抛出，
# 从而强行拯救那些设置了 HTTP_PROXY 的下游容器，使其能够访问国内网络。

# HTTP/SOCKS 混合端口
mixed-port: 7890
# API 面板端口
external-controller: 0.0.0.0:9090
# 允许局域网访问
allow-lan: true
# 强制全局模式
mode: global
# 极简日志
log-level: warning

# 空阵列：没有任何代理节点
proxies: []
# 空阵列：没有任何策略组
proxy-groups: []

# 唯一一条规则：所有流量匹配均走 DIRECT (直连)
rules:
  - MATCH,DIRECT
